<div class="booking-page">
  @if (!submitted) {
    <div class="booking-card">
      <a class="back-link" [routerLink]="['/services']">← Back to Services</a>
      <h1>Book a Service</h1>
      <p class="subtitle">Provider #{{ providerId }}</p>

      <form (submit)="onSubmit($event)">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input id="name" type="text" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input id="phone" type="tel" placeholder="07X XXX XXXX" required />
        </div>
        <div class="form-group">
          <label for="date">Preferred Date</label>
          <input id="date" type="date" required />
        </div>
        <div class="form-group">
          <label for="time">Preferred Time</label>
          <input id="time" type="time" required />
        </div>
        <div class="form-group">
          <label for="location">Service Location</label>
          <input id="location" type="text" placeholder="Your address" required />
        </div>
        <div class="form-group">
          <label for="notes">Additional Notes</label>
          <textarea id="notes" rows="3" placeholder="Describe what you need..."></textarea>
        </div>
        <button type="submit" class="btn-confirm">Confirm Booking</button>
      </form>
    </div>
  } @else {
    <div class="success-card">
      <div class="success-icon">✅</div>
      <h2>Booking Confirmed!</h2>
      <p>Your booking has been submitted. The provider will contact you shortly.</p>
      <a class="btn-home" [routerLink]="['/']">Back to Home</a>
    </div>
  }
</div>
